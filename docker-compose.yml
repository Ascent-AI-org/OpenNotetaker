# One config, one command:
#   cp .env.example .env   (set DEEPGRAM_API_KEY, GEMINI_API_KEY, RUNNER_TOKEN)
#   docker compose up -d
#
# The same .env drives local `npm run dev` and this compose stack. Values that are
# container infrastructure (paths, audio sink, internal URLs) are pinned per service
# below, so whatever you set in .env for local development never breaks the containers.
services:
  open-notetaker:
    build: .
    ports:
      # Bind to localhost: put a TLS reverse proxy (Caddy, nginx) in front before
      # exposing this beyond the host.
      - "127.0.0.1:5173:5173"
    env_file:
      - .env
    environment:
      # The container must listen on all interfaces for the port mapping to work;
      # the host-side bind above stays on 127.0.0.1.
      HOST: 0.0.0.0
      # Compose is the fleet deployment: this app only queues jobs, workers record.
      BOT_PROVIDER: fleet
    volumes:
      - open-notetaker-data:/app/data
    shm_size: "1gb"
    restart: unless-stopped

  # One worker records one meeting at a time. Scale concurrent recordings with:
  #   docker compose up -d --scale open-notetaker-worker=3
  # Each replica copies the signed-in seed profile (see docker/entrypoint.sh) into
  # container-local storage so Chrome instances never share a live profile.
  open-notetaker-worker:
    build: .
    command: ["npm", "run", "bot:worker"]
    env_file:
      - .env
    environment:
      # Workers talk to the web app over the compose network, never the public URL.
      OPENNOTETAKER_BASE_URL: http://open-notetaker:5173
      BOT_PROFILE_SEED_DIR: /seed/bot-profile
      BOT_CHROME_USER_DATA_DIR: /app/.bot-profile-local
      # Container browser/audio stack. Pinned here so macOS-specific values in .env
      # (chrome channel, avfoundation, etc.) cannot leak into the Linux container.
      BOT_CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      BOT_CHROME_LAUNCH_MODE: rawcdp
      BOT_CHROME_EXTRA_ARGS: --no-sandbox --disable-dev-shm-usage
      BOT_HEADLESS: "false"
      FFMPEG_PATH: /usr/bin/ffmpeg
      AUDIO_CAPTURE_DRIVER: pulse
      AUDIO_CAPTURE_SOURCE: open_notetaker.monitor
    volumes:
      - open-notetaker-bot-profile:/seed/bot-profile:ro
    depends_on:
      - open-notetaker
    shm_size: "1gb"
    # Give an in-progress recording time to finish and submit before SIGKILL.
    stop_grace_period: 60s
    restart: unless-stopped

volumes:
  open-notetaker-data:
  open-notetaker-bot-profile:
